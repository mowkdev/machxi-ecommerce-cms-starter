name: machxi-ecommerce-cms-starter

networks:
  machxi-ecommerce-cms-starter:
    name: machxi-ecommerce-cms-starter
    driver: bridge

volumes:
  pg-data:
  minio-data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_MEDUSA_DB}
      POSTGRES_MEDUSA_DB: ${POSTGRES_MEDUSA_DB}
      POSTGRES_PAYLOAD_DB: ${POSTGRES_PAYLOAD_DB}
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_MEDUSA_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - machxi-ecommerce-cms-starter

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - machxi-ecommerce-cms-starter

  createbuckets:
    image: minio/mc:latest
    container_name: minio-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/$${MINIO_MEDUSA_BUCKET};
      mc mb --ignore-existing local/$${MINIO_PAYLOAD_BUCKET};
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_MEDUSA_BUCKET: ${MINIO_MEDUSA_BUCKET}
      MINIO_PAYLOAD_BUCKET: ${MINIO_PAYLOAD_BUCKET}
    networks:
      - machxi-ecommerce-cms-starter
