  <!-- Disc body -->
  <circle cx="200" cy="200" r="55" fill="url(#m-disc)"/>

  <!-- Craters — muted amber-brown -->
  <g fill="#8a7a50" opacity="0.22">
    <ellipse cx="186" cy="184" rx="9" ry="6.5"/>
    <ellipse cx="216" cy="196" rx="5" ry="4"/>
    <ellipse cx="194" cy="218" rx="7" ry="5.5"/>
    <ellipse cx="222" cy="220" rx="3" ry="2.5"/>
    <ellipse cx="176" cy="206" rx="2.5" ry="2.5"/>
    <ellipse cx="210" cy="172" rx="2.5" ry="1.8"/>
  </g>
</svg>
