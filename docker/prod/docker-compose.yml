# Production stack: full container set used both on the Hetzner / Contabo VPS
# and (with the local-minio override) for local prod-parity testing.
#
# Reads /opt/machxi/.env on the VPS (real secrets) or docker/prod/.env when
# run from the repo root. See docker/prod/.env.example for the schema.
#
# Object storage (Contabo / R2 / AWS S3 / etc.) is configured via the S3_*
# env vars. Both Medusa and Payload read the same credentials and endpoint;
# only the bucket name differs (S3_BUCKET_MEDUSA vs S3_BUCKET_PAYLOAD).
#
# For local testing without an external object storage account, layer on
# docker-compose.local-minio.yml which adds a MinIO container and points
# S3_ENDPOINT at it. `pnpm docker:prod:local` does this automatically.

name: machxi-prod

networks:
  machxi:
    name: machxi
    driver: bridge

volumes:
  pg-data:
  redis-data:
  caddy-data:
  caddy-config:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_MEDUSA_DB}
      POSTGRES_MEDUSA_DB: ${POSTGRES_MEDUSA_DB}
      POSTGRES_PAYLOAD_DB: ${POSTGRES_PAYLOAD_DB}
    ports:
      # Expose on a non-standard host port so it doesn't collide with the dev
      # postgres on 5432. Internal docker network still uses 5432. Used by the
      # local launcher to migrate from the host (in-container migrate hangs).
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ../postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_MEDUSA_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [machxi]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # noeviction is REQUIRED by BullMQ (used by Medusa's workflow-engine-redis
    # and event-bus-redis). With allkeys-lru, jobs / events can be silently
    # dropped under memory pressure.
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [machxi]

  # ──────────────────────────────────────────────────────────────────────────
  # Medusa — split server / worker. Same image, different MEDUSA_WORKER_MODE.
  # `backend` handles HTTP only; `backend-worker` handles BullMQ jobs and
  # subscribers. Both share the same Redis so the server posts jobs and the
  # worker picks them up. Scheduled jobs (cron) ONLY run on the worker — never
  # set workerMode=server on it.
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/mowkdev/machxi-backend}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MEDUSA_WORKER_MODE: server
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_MEDUSA_DB}
      REDIS_URL: redis://redis:6379
      STORE_CORS: ${STORE_CORS}
      ADMIN_CORS: ${ADMIN_CORS}
      AUTH_CORS: ${AUTH_CORS}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      PAYLOAD_SERVER_URL: ${PAYLOAD_SERVER_URL}
      # Object storage (Contabo / R2 / S3 — same interface).
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_FILE_URL: ${S3_FILE_URL}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET_MEDUSA}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
    networks: [machxi]

  backend-worker:
    image: ${BACKEND_IMAGE:-ghcr.io/mowkdev/machxi-backend}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MEDUSA_WORKER_MODE: worker
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_MEDUSA_DB}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      PAYLOAD_SERVER_URL: ${PAYLOAD_SERVER_URL}
      # Storefront-side CORS is irrelevant for the worker (no HTTP), but the
      # config schema still requires them — pass empty strings to satisfy
      # validation without granting any extra origin.
      STORE_CORS: ""
      ADMIN_CORS: ""
      AUTH_CORS: ""
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_FILE_URL: ${S3_FILE_URL}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET_MEDUSA}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
    # Intentionally no `ports:` block — the worker is not user-facing.
    networks: [machxi]

  storefront:
    image: ${STOREFRONT_IMAGE:-ghcr.io/mowkdev/machxi-storefront}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      MEDUSA_BACKEND_URL: http://backend:9000
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_DEFAULT_REGION: ${NEXT_PUBLIC_DEFAULT_REGION:-us}
      NEXT_PUBLIC_DEFAULT_COUNTRY_CODE: ${NEXT_PUBLIC_DEFAULT_COUNTRY_CODE:-us}
      PAYLOAD_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_PAYLOAD_DB}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PAYLOAD_PREVIEW_SECRET: ${PAYLOAD_PREVIEW_SECRET}
      PAYLOAD_MCP_API_KEY: ${PAYLOAD_MCP_API_KEY:-}
      PAYLOAD_PUSH: ${PAYLOAD_PUSH:-}
      # Payload's S3 storage plugin — same endpoint + creds as Medusa, but
      # a different bucket so they don't collide.
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET_PAYLOAD}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
    networks: [machxi]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - storefront
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN_STOREFRONT: ${DOMAIN_STOREFRONT}
      DOMAIN_API: ${DOMAIN_API}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks: [machxi]
