# Production stack: full container set used both on the Hetzner VPS and for
# local prod-parity testing (`pnpm docker:prod`).
#
# Reads /opt/machxi/.env on the VPS (real secrets) or docker/prod/.env.local
# when run from the repo root. See docker/prod/.env.example for the schema.

name: machxi-prod

networks:
  machxi:
    name: machxi
    driver: bridge

volumes:
  pg-data:
  redis-data:
  minio-data:
  caddy-data:
  caddy-config:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_MEDUSA_DB}
      POSTGRES_MEDUSA_DB: ${POSTGRES_MEDUSA_DB}
      POSTGRES_PAYLOAD_DB: ${POSTGRES_PAYLOAD_DB}
    ports:
      # Expose on a non-standard host port so it doesn't collide with the
      # dev postgres on 5432. Internal docker network still uses 5432.
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ../postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_MEDUSA_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [machxi]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # noeviction is REQUIRED by BullMQ (used by Medusa's workflow-engine-redis
    # and event-bus-redis). With allkeys-lru, jobs / events can be silently
    # dropped under memory pressure.
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [machxi]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [machxi]

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/$${MINIO_MEDUSA_BUCKET};
      mc mb --ignore-existing local/$${MINIO_PAYLOAD_BUCKET};
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_MEDUSA_BUCKET: ${MINIO_MEDUSA_BUCKET}
      MINIO_PAYLOAD_BUCKET: ${MINIO_PAYLOAD_BUCKET}
    networks: [machxi]

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/mowkdev/machxi-backend}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_MEDUSA_DB}
      REDIS_URL: redis://redis:6379
      STORE_CORS: ${STORE_CORS}
      ADMIN_CORS: ${ADMIN_CORS}
      AUTH_CORS: ${AUTH_CORS}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      PAYLOAD_SERVER_URL: ${PAYLOAD_SERVER_URL}
      MEDUSA_WORKER_MODE: ${MEDUSA_WORKER_MODE:-shared}
      # S3 / MinIO for file uploads
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_FILE_URL: ${S3_FILE_URL}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${MINIO_MEDUSA_BUCKET}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    networks: [machxi]

  storefront:
    image: ${STOREFRONT_IMAGE:-ghcr.io/mowkdev/machxi-storefront}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # Server-side URL for Medusa SDK + middleware. Points at the backend
      # container on the internal network.
      MEDUSA_BACKEND_URL: http://backend:9000
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_DEFAULT_REGION: ${NEXT_PUBLIC_DEFAULT_REGION:-us}
      NEXT_PUBLIC_DEFAULT_COUNTRY_CODE: ${NEXT_PUBLIC_DEFAULT_COUNTRY_CODE:-us}
      PAYLOAD_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_PAYLOAD_DB}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PAYLOAD_PREVIEW_SECRET: ${PAYLOAD_PREVIEW_SECRET}
      PAYLOAD_MCP_API_KEY: ${PAYLOAD_MCP_API_KEY:-}
      PAYLOAD_PUSH: ${PAYLOAD_PUSH:-}
      # Payload's S3 storage plugin
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${MINIO_PAYLOAD_BUCKET}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    networks: [machxi]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - storefront
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN_STOREFRONT: ${DOMAIN_STOREFRONT}
      DOMAIN_API: ${DOMAIN_API}
      DOMAIN_CDN: ${DOMAIN_CDN:-cdn.localhost}
      CADDY_TLS: ${CADDY_TLS:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks: [machxi]
